<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce Moderno - Fullstack Challenge</title>
    <script>
        // Redirigir a index.html para SPA
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/Fullstack-Challenge---E-commerce/' +
            l.pathname.slice(1).split('/').slice(0, pathSegmentsToKeep).join('/') +
            '/?p=/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
        );
    </script>
</head>
<body>
    <!-- Fallback content -->
    <p>Redirigiendo...</p>
</body>
</html>
